apiVersion: v1
kind: Namespace
metadata:
  name: production
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      tolerations:
        - key: "node.kubernetes.io/memory-pressure"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "workload-type"
          operator: "Equal"
          value: "general"
          effect: "NoSchedule"
        - key: "workload-type"
          operator: "Equal"
          value: "general"
          effect: "NoExecute"
      containers:
        - name: backend
          image: gcr.io/deployementdl/car-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 7860
          env:
            - name: PORT
              value: "7860"
          resources:
            requests:
              memory: "512Mi"
            limits:
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: production
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 7860
      targetPort: 7860
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      tolerations:
        - key: "node.kubernetes.io/memory-pressure"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "workload-type"
          operator: "Equal"
          value: "general"
          effect: "NoSchedule"
        - key: "workload-type"
          operator: "Equal"
          value: "general"
          effect: "NoExecute"
      containers:
        - name: frontend
          image: gcr.io/deployementdl/car-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
            limits:
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: production
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
