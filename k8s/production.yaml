apiVersion: v1
kind: Namespace
metadata:
  # This creates a separate space for the production environment.
  name: production
---
apiVersion: apps/v1
kind: Deployment
metadata:
  # This runs the backend app in the production namespace.
  name: backend
  namespace: production
spec:
  # Only one backend pod for this environment.
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          # Backend image to run.
          image: car-backend:latest
          # Reuse the local image if it already exists.
          imagePullPolicy: IfNotPresent
          ports:
            # Backend listens on this port.
            - containerPort: 7860
          env:
            # Tell the app which port to use.
            - name: PORT
              value: "7860"
---
apiVersion: v1
kind: Service
metadata:
  # This lets other pods talk to the backend.
  name: backend
  namespace: production
spec:
  # Internal service only.
  selector:
    app: backend
  ports:
    - port: 7860
      targetPort: 7860
---
apiVersion: apps/v1
kind: Deployment
metadata:
  # This runs the frontend app in the production namespace.
  name: frontend
  namespace: production
spec:
  # Only one frontend pod for this environment.
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # Frontend image to run.
          image: car-frontend:latest
          # Reuse the local image if it already exists.
          imagePullPolicy: IfNotPresent
          ports:
            # Nginx listens on port 80.
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  # This exposes the frontend to the internet.
  name: frontend
  namespace: production
spec:
  # LoadBalancer gives this service a public IP.
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
