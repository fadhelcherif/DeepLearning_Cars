apiVersion: v1
kind: Namespace
metadata:
  name: test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: gcr.io/deployementdl/car-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7860
          env:
            - name: PORT
              value: "7860"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: test
spec:
  selector:
    app: backend
  ports:
    - port: 7860
      targetPort: 7860
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: gcr.io/deployementdl/car-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: test
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # Frontend image to run.
          image: gcr.io/deployementdl/car-frontend:latest
          # Reuse the local image if it already exists.
          imagePullPolicy: IfNotPresent
          ports:
            # Nginx listens on port 80.
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  # This exposes the frontend to the internet.
  name: frontend
  namespace: test
spec:
  # LoadBalancer gives this service a public IP.
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
